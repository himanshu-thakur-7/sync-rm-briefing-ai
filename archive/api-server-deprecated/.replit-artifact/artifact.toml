kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api", "/ws"]

[services.development]
run = "cd /home/runner/workspace/artifacts/sync-backend && python3 -m uvicorn main:app --host 0.0.0.0 --port 8080 --reload --reload-dir /home/runner/workspace/artifacts/sync-backend"

[services.production]

[services.production.build]
args = ["echo", "Python — no build step needed"]

[services.production.run]
args = [
  "python3", "-m", "uvicorn", "main:app",
  "--host", "0.0.0.0",
  "--port", "8080",
  "--workers", "2"
]

[services.production.run.env]
PORT = "8080"
PYTHONPATH = "/home/runner/workspace/artifacts/sync-backend"

[services.production.health.startup]
path = "/api/healthz"
