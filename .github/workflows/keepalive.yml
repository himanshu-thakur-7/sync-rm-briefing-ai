# Keeps the Render free-tier backend warm (it sleeps after 15 min idle;
# cold start ≈ 30–60 s — fatal in a live demo). GitHub cron is best-effort
# (can lag a few minutes) but comfortably beats the 15-minute idle window.
name: keep-backend-warm

on:
  schedule:
    # Every 45s the radar cache TTL expires (60s). Pinging every 5 min keeps
    # both the server warm AND the radar cache permanently populated so the
    # Ringg agent's top_priority tool call NEVER pays a cold-scan cost.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping healthz + radar
        run: |
          set +e
          h=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 \
            https://sync-backend-u9rv.onrender.com/api/healthz)
          echo "healthz → $h"
          # Warm the radar cache so the next agent tool call is instant.
          t=$(curl -s -o /dev/null -w "%{http_code}|%{time_total}" --max-time 30 \
            -X POST -H "Content-Type: application/json" -d '{}' \
            https://sync-backend-u9rv.onrender.com/api/v1/ringg-tools/top_priority)
          echo "top_priority → $t"
          # Best-effort — never fail the workflow on transient misses.
          exit 0
