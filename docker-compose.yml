services:
  backend:
    build: ./artifacts/sync-backend
    ports:
      - "8000:8000"
    env_file:
      - .env

  dashboard:
    build:
      context: .
      dockerfile: artifacts/sync-dashboard/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:8000
      - VITE_WS_URL=ws://backend:8000
    depends_on:
      - backend
